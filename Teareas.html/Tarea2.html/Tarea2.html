<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarJump — Videojuego</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0a0a1a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:monospace;
  color:#fff;
}

/* HUD */
#hud { display:flex; gap:20px; margin-bottom:10px; }
.hud-val { font-weight:bold; }

/* Canvas */
canvas {
  border:2px solid #1a1a3a;
  border-radius:8px;
}

/* Overlay */
#overlay {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
}
#overlay.hidden { display:none; }

.overlay-wrap { position:relative; }
</style>
</head>

<body>

<div id="hud">
  Nivel: <span id="nivel-val">1</span>
  Score: <span id="score-val">0</span>
</div>

<div class="overlay-wrap">
  <canvas id="c" width="640" height="400"></canvas>
  <div id="overlay" class="hidden">
    <h2>PAUSA</h2>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let estado = 'jugando'; // 🔥 ya inicia jugando
let nivel = 1;
let score = 0;

let jugador = {
  x:50, y:300,
  w:30, h:30,
  vx:0, vy:0,
  enSuelo:false
};

const gravedad = 0.5;

/* INPUT */
const keys = {};

document.addEventListener('keydown', e => {
  keys[e.code] = true;
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

/* UPDATE */
function update(){
  if(estado !== 'jugando') return;

  // movimiento
  if(keys['ArrowLeft']) jugador.vx = -4;
  else if(keys['ArrowRight']) jugador.vx = 4;
  else jugador.vx = 0;

  // salto
  if(keys['Space'] && jugador.enSuelo){
    jugador.vy = -10;
    jugador.enSuelo = false;
  }

  // física
  jugador.vy += gravedad;
  jugador.x += jugador.vx;
  jugador.y += jugador.vy;

  // suelo
  if(jugador.y + jugador.h >= 360){
    jugador.y = 360 - jugador.h;
    jugador.vy = 0;
    jugador.enSuelo = true;
  }

  // bordes
  if(jugador.x < 0) jugador.x = 0;
  if(jugador.x + jugador.w > 640) jugador.x = 640 - jugador.w;
}

/* DRAW */
function draw(){
  ctx.fillStyle = '#0d0d2b';
  ctx.fillRect(0,0,640,400);

  // suelo
  ctx.fillStyle = '#2e7d32';
  ctx.fillRect(0,360,640,40);

  // jugador
  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(jugador.x, jugador.y, jugador.w, jugador.h);
}

/* LOOP */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* iniciar */
loop();
</script>

</body>
</html>
