<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarJump</title>

<style>
body{
  margin:0;
  background:#0a0a1a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
  color:white;
}

canvas{
  border:2px solid #1a1a3a;
  border-radius:8px;
  image-rendering: pixelated;
}

#overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.7);
  cursor:pointer;
}

.hidden{ display:none; }
.wrap{ position:relative; }
</style>
</head>

<body>

<div class="wrap">
  <canvas id="c" width="640" height="400"></canvas>

  <div id="overlay">
    <h1>★ STAR JUMP ★</h1>
    <p>Click o presiona ESPACIO</p>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let estado = 'inicio';

/* ⭐ ESTRELLAS OPTIMIZADAS */
const estrellas = [];
for(let i=0;i<40;i++){
  estrellas.push({
    x: Math.random()*640,
    y: Math.random()*300
  });
}

/* 👤 JUGADOR */
let p = {
  x:50, y:300,
  w:30, h:35,
  vx:0, vy:0,
  saltos:0,
  enSuelo:false
};

const gravedad = 0.5;

/* 🧱 PLATAFORMAS */
const plataformas = [
  {x:0,y:360,w:640,h:40},
  {x:120,y:280,w:100,h:10},
  {x:300,y:220,w:100,h:10},
  {x:480,y:160,w:100,h:10},
  {x:300,y:100,w:120,h:10, meta:true}
];

/* 🎮 INPUT */
const keys = {};

document.addEventListener('keydown', e=>{
  keys[e.code]=true;

  if(e.code==='Space' && estado==='inicio'){
    iniciar();
  }
});

document.addEventListener('keyup', e=>{
  keys[e.code]=false;
});

/* CLICK INICIO */
document.getElementById('overlay').onclick = iniciar;

function iniciar(){
  estado='jugando';
  document.getElementById('overlay').classList.add('hidden');
}

/* 🔄 UPDATE */
function update(){
  if(estado!=='jugando') return;

  // movimiento
  if(keys['ArrowLeft']) p.vx=-4;
  else if(keys['ArrowRight']) p.vx=4;
  else p.vx=0;

  // doble salto
  if((keys['Space']||keys['ArrowUp']) && p.saltos<2){
    p.vy=-10;
    p.saltos++;
    keys['Space']=false;
  }

  // gravedad
  p.vy+=gravedad;
  p.x+=p.vx;
  p.y+=p.vy;

  p.enSuelo=false;

  // colisiones
  for(let pl of plataformas){
    if(p.x < pl.x + pl.w && p.x + p.w > pl.x){
      if(p.y + p.h >= pl.y && p.y + p.h <= pl.y + 10 && p.vy >= 0){
        p.y = pl.y - p.h;
        p.vy = 0;
        p.enSuelo = true;
        p.saltos = 0;

        if(pl.meta){
          estado='ganaste';
          alert('🎉 GANASTE');
        }
      }
    }
  }

  // bordes
  if(p.x<0) p.x=0;
  if(p.x+p.w>640) p.x=640-p.w;

  // caída
  if(p.y>450){
    p.x=50;
    p.y=300;
  }
}

/* 🎨 DRAW */
function draw(){
  ctx.fillStyle='#0d0d2b';
  ctx.fillRect(0,0,640,400);

  // estrellas (sin lag)
  ctx.fillStyle='#fff';
  for(let s of estrellas){
    ctx.fillRect(s.x, s.y, 2, 2);
  }

  // plataformas
  for(let pl of plataformas){
    ctx.fillStyle = pl.meta ? '#f9a825' : '#2e7d32';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
  }

  // jugador
  ctx.fillStyle='#4fc3f7';
  ctx.fillRect(p.x, p.y, p.w, p.h);
}

/* 🔁 LOOP */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
