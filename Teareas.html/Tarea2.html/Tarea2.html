<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarJump - FUNCIONA</title>
<style>
body{margin:0;background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;color:white}
canvas{border:2px solid #1a1a3a;border-radius:8px;image-rendering:pixelated}
#overlay{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;background:rgba(0,0,0,0.8);cursor:pointer;font-size:18px}
.hidden{display:none}
.wrap{position:relative}
</style>
</head>
<body>
<div class="wrap">
<canvas id="c" width="640" height="400"></canvas>
<div id="overlay">
<h1>★ STAR JUMP ★</h1>
<p>Click o ESPACIO para jugar<br>← → mover | ESPACIO subir (doble salto)</p>
</div>
</div>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let estado='inicio',keys={};

// ESTRELLAS
const estrellas=[];
for(let i=0;i<50;i++)estrellas.push({x:Math.random()*640,y:Math.random()*350});

// JUGADOR
let p={x:50,y:320,w:24,h:32,vx:0,vy:0,saltos:0};

// PLATAFORMAS
const plataformas=[
  {x:0,y:368,w:640,h:32},     // suelo
  {x:100,y:300,w:120,h:12},   // 1
  {x:280,y:240,w:100,h:12},   // 2  
  {x:450,y:180,w:100,h:12},   // 3
  {x:320,y:120,w:140,h:16,meta:true} // META DORADA
];

const gravedad=0.6;

// INPUT
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'&&estado==='inicio')iniciar()});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.getElementById('overlay').onclick=iniciar;

function iniciar(){
  estado='jugando';
  document.getElementById('overlay').classList.add('hidden');
  p={x:50,y:320,w:24,h:32,vx:0,vy:0,saltos:0};
}

function update(){
  if(estado!=='jugando')return;
  
  // MOVIMIENTO
  p.vx=keys['ArrowLeft']?-5:keys['ArrowRight']?5:0;
  
  // SALTO
  if((keys['Space']||keys['ArrowUp'])&&p.saltos<2){
    p.vy=-13;p.saltos++;keys['Space']=keys['ArrowUp']=false;
  }
  
  // FISICA
  p.vy+=gravedad;p.x+=p.vx;p.y+=p.vy;
  
  // COLLISIONES SIMPLES
  let enSuelo=false;
  for(let pl of plataformas){
    if(p.x+24>pl.x&&p.x<pl.x+pl.w&&
       p.y+32>pl.y&&p.y+32<pl.y+20&&p.vy>=0){
      p.y=pl.y-32;p.vy=0;enSuelo=true;p.saltos=0;
      if(pl.meta){estado='win';setTimeout(()=>alert('🎉 GANASTE! 🎉'),200);return;}
    }
  }
  
  // BORDES
  p.x=Math.max(0,Math.min(616,p.x));
  if(p.y>450){p.x=50;p.y=320;p.vy=0;p.saltos=0;} // RESET
}

function draw(){
  // FONDO
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,640,400);
  
  // ESTRELLAS
  ctx.fillStyle='#fff';
  estrellas.forEach(s=>ctx.fillRect(s.x,s.y,2,2));
  
  // PLATAFORMAS
  plataformas.forEach(pl=>{
    ctx.fillStyle=pl.meta?'#ffd700':'#4caf50';
    ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(pl.x,pl.y,pl.w,pl.h);
  });
  
  // JUGADOR
  ctx.fillStyle='#2196f3';ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.fillStyle=p.saltos<2?'#bbdefb':'#f44336';
  ctx.font='bold 14px monospace';ctx.fillText('Saltos: '+(2-p.saltos),10,25);
  
  if(estado==='win'){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillRect(0,0,640,400);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
