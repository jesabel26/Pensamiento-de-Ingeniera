<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarJump - Corregido</title>

<style>
body{
  margin:0;
  background:#0a0a1a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
  color:white;
}

canvas{
  border:2px solid #1a1a3a;
  border-radius:8px;
  image-rendering: pixelated;
}

#overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.7);
  cursor:pointer;
}

.hidden{ display:none; }
.wrap{ position:relative; }
</style>
</head>

<body>

<div class="wrap">
  <canvas id="c" width="640" height="400"></canvas>

  <div id="overlay">
    <h1>★ STAR JUMP ★</h1>
    <p>Click o presiona ESPACIO para jugar<br>FLECHAS ← → para mover, ESPACIO/Arriba para saltar (doble salto)</p>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let estado = 'inicio';

/* ⭐ ESTRELLAS OPTIMIZADAS */
const estrellas = [];
for(let i=0;i<40;i++){
  estrellas.push({
    x: Math.random()*640,
    y: Math.random()*300
  });
}

/* 👤 JUGADOR */
let p = {
  x:50, y:300,
  w:30, h:35,
  vx:0, vy:0,
  saltos:0,
  enSuelo:false
};

const gravedad = 0.5;

/* 🧱 PLATAFORMAS */
const plataformas = [
  {x:0,y:360,w:640,h:40},
  {x:120,y:280,w:100,h:10},
  {x:300,y:220,w:100,h:10},
  {x:480,y:160,w:100,h:10},
  {x:300,y:100,w:120,h:10, meta:true}
];

/* 🎮 INPUT */
const keys = {};

document.addEventListener('keydown', e=>{
  keys[e.code]=true;

  if(e.code==='Space' && estado==='inicio'){
    iniciar();
  }
});

document.addEventListener('keyup', e=>{
  keys[e.code]=false;
});

/* CLICK INICIO */
document.getElementById('overlay').onclick = iniciar;

function iniciar(){
  estado='jugando';
  document.getElementById('overlay').classList.add('hidden');
  // Reset jugador
  p.x = 50;
  p.y = 300;
  p.vx = 0;
  p.vy = 0;
  p.saltos = 0;
  p.enSuelo = false;
}

/* 🔄 UPDATE */
function update(){
  if(estado!=='jugando') return;

  // Movimiento horizontal
  if(keys['ArrowLeft']) p.vx = -4;
  else if(keys['ArrowRight']) p.vx = 4;
  else p.vx *= 0.8; // Fricción

  // Salto (doble salto)
  if((keys['Space'] || keys['ArrowUp']) && p.saltos < 2){
    p.vy = -12;
    p.saltos++;
    // Prevenir múltiples saltos en el mismo frame
    keys['Space'] = false;
    keys['ArrowUp'] = false;
  }

  // Gravedad
  p.vy += gravedad;
  
  // Actualizar posición
  p.x += p.vx;
  p.y += p.vy;

  p.enSuelo = false;
  p.saltos = 1; // Permitir solo 1 salto en el aire por defecto

  // Colisiones con plataformas (CORREGIDO)
  for(let pl of plataformas){
    // Colisión horizontal primero
    if(p.x < pl.x + pl.w && 
       p.x + p.w > pl.x &&
       p.y + p.h > pl.y &&
       p.y + p.h < pl.y + pl.h + p.vy){
      
      // Aterrizaje desde arriba
      if(p.vy >= 0){
        p.y = pl.y - p.h;
        p.vy = 0;
        p.enSuelo = true;
        p.saltos = 0; // Reset saltos al tocar suelo
        
        if(pl.meta){
          estado = 'ganaste';
          setTimeout(() => {
            alert('🎉 ¡GANASTE! 🎉');
            location.reload();
          }, 100);
        }
      }
    }
  }

  // Bordes laterales
  if(p.x < 0) p.x = 0;
  if(p.x + p.w > 640) p.x = 640 - p.w;

  // Borde inferior (reset)
  if(p.y > 450){
    p.x = 50;
    p.y = 300;
    p.vx = 0;
    p.vy = 0;
    p.saltos = 0;
  }
}

/* 🎨 DRAW */
function draw(){
  // Fondo
  ctx.fillStyle = '#0d0d2b';
  ctx.fillRect(0, 0, 640, 400);

  // Estrellas
  ctx.fillStyle = '#fff';
  for(let s of estrellas){
    ctx.fillRect(s.x, s.y, 2, 2);
  }

  // Plataformas
  for(let pl of plataformas){
    ctx.fillStyle = pl.meta ? '#f9a825' : '#2e7d32';
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    
    // Borde de plataformas
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
  }

  // Jugador (azul con sombra)
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.shadowBlur = 0;
  
  // Indicador de saltos restantes
  ctx.fillStyle = p.saltos < 2 ? '#90caf9' : '#ff5722';
  ctx.font = '12px monospace';
  ctx.fillText(`Saltos: ${2 - p.saltos}`, 10, 30);
}

/* 🔁 LOOP */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
