<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarJump - 12 NIVELES CORREGIDO</title>
<style>
body{margin:0;background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace;color:white}
canvas{border:4px solid #ffd700;border-radius:12px;box-shadow:0 0 30px #ffd700;image-rendering:pixelated}
#overlay{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;background:rgba(0,0,0,0.9);cursor:pointer;font-size:20px;text-align:center}
.hidden{display:none!important}
.wrap{position:relative}
</style>
</head>
<body>
<div class="wrap">
<canvas id="c" width="640" height="400"></canvas>
<div id="overlay">
<h1>★ STAR JUMP ★</h1>
<p>Nivel <span id="nivelActual">1</span>/12<br>← → mover | ESPACIO doble salto</p>
<button id="btnJugar" onclick="iniciar()" style="padding:15px 30px;font-size:18px;font-family:monospace;background:#ffd700;color:#000;border:none;border-radius:8px;cursor:pointer;margin-top:20px;font-weight:bold">▶ JUGAR</button>
</div>
</div>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let estado='inicio',keys={},nivelActual=1,puntos=0,marcadorMax=0;
const overlay = document.getElementById('overlay');
const btnJugar = document.getElementById('btnJugar');
const nivelSpan = document.getElementById('nivelActual');

// ESTRELLAS
const estrellas=[];
for(let i=0;i<80;i++)estrellas.push({x:Math.random()*640,y:Math.random()*350,vx:(Math.random()-0.5)*0.6});

// JUGADOR
let p={x:50,y:320,w:24,h:32,vx:0,vy:0,saltos:0};

// 12 NIVELES
const niveles=[
  [{x:0,y:368,w:640,h:32},{x:120,y:300,w:140,h:12},{x:320,y:240,w:120,h:12},{x:450,y:180,w:140,h:16,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:80,y:310,w:100,h:12},{x:250,y:260,w:80,h:12},{x:400,y:200,w:100,h:12},{x:500,y:140,w:120,h:16,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:60,y:320,w:80,h:12},{x:220,y:270,w:60,h:12},{x:350,y:210,w:70,h:12},{x:480,y:150,w:140,h:16,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:40,y:330,w:70,h:12},{x:180,y:280,w:60,h:12},{x:320,y:220,w:70,h:12},{x:450,y:160,w:160,h:20,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:30,y:340,w:60,h:12},{x:160,y:290,w:50,h:12},{x:300,y:230,w:60,h:12},{x:420,y:170,w:70,h:12},{x:520,y:110,w:100,h:20,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:50,y:330,w:50,h:12},{x:150,y:280,w:45,h:12},{x:280,y:230,w:40,h:12},{x:400,y:180,w:45,h:12},{x:520,y:130,w:80,h:16,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:70,y:320,w:60,h:12},{x:200,y:260,w:50,h:12},{x:100,y:200,w:60,h:12},{x:300,y:150,w:50,h:12},{x:450,y:110,w:100,h:18,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:40,y:340,w:50,h:12},{x:160,y:200,w:40,h:12},{x:320,y:300,w:50,h:12},{x:480,y:160,w:60,h:12},{x:550,y:100,w:70,h:18,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:30,y:350,w:45,h:12},{x:120,y:310,w:40,h:12},{x:240,y:260,w:35,h:12},{x:370,y:210,w:40,h:12},{x:500,y:150,w:90,h:20,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:25,y:355,w:40,h:12},{x:130,y:300,w:35,h:12},{x:260,y:245,w:35,h:12},{x:390,y:190,w:35,h:12},{x:510,y:130,w:80,h:20,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:20,y:360,w:35,h:12},{x:110,y:320,w:30,h:12},{x:230,y:270,w:30,h:12},{x:360,y:220,w:30,h:12},{x:480,y:160,w:35,h:12},{x:560,y:105,w:60,h:22,meta:true}],
  [{x:0,y:368,w:640,h:32},{x:15,y:365,w:30,h:12},{x:100,y:330,w:28,h:12},{x:210,y:285,w:28,h:12},{x:330,y:235,w:28,h:12},{x:450,y:185,w:28,h:12},{x:540,y:120,w:70,h:24,meta:true}]
];

let plataformas=[];
const gravedad=0.68;

function cargarNivel(n){
  plataformas=niveles[n-1];
  p.x=50;p.y=320;p.vx=0;p.vy=0;p.saltos=0;
  nivelSpan.textContent=n;
}

function iniciar(){
  estado='jugando';
  overlay.classList.add('hidden');
  nivelActual=1;puntos=0;
  cargarNivel(1);
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'&&estado==='inicio')iniciar();
});
document.addEventListener('keyup',e=>keys[e.code]=false);
overlay.onclick=iniciar;

function update(){
  if(estado!=='jugando')return;
  
  p.vx=keys['ArrowLeft']?-5.8:keys['ArrowRight']?5.8:p.vx*0.82;
  
  if((keys['Space']||keys['ArrowUp'])&&p.saltos<2){
    p.vy=-12.8-(nivelActual*0.08);p.saltos++;keys['Space']=keys['ArrowUp']=false;
  }
  
  p.vy+=gravedad;p.x+=p.vx;p.y+=p.vy;
  
  let enSuelo=false;
  for(let pl of plataformas){
    if(p.x+24>pl.x&&p.x<pl.x+pl.w&&p.y+32>pl.y&&p.y+32<pl.y+25&&p.vy>=0){
      p.y=pl.y-32;p.vy=0;enSuelo=true;p.saltos=0;
      if(pl.meta){
        puntos+=150*nivelActual;
        if(nivelActual<12){
          nivelActual++;
          setTimeout(()=>{
            cargarNivel(nivelActual);
          },800);
        }else{
          estado='win';
          marcadorMax=Math.max(marcadorMax,puntos);
          setTimeout(()=>alert(`🏆 ¡LEYENDA!\nPuntos: ${puntos}\nRecord: ${marcadorMax}`),400);
        }
        return;
      }
    }
  }
  
  p.x=Math.max(0,Math.min(616,p.x));
  if(p.y>465){
    puntos-=30*nivelActual;
    p.x=50;p.y=320;p.vx=0;p.vy=0;p.saltos=0;
  }
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,640,400);
  
  estrellas.forEach(s=>{
    s.x+=s.vx;s.x<0?s.x=640:s.x>640&&(s.x=0);
    ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,2,2);
  });
  
  plataformas.forEach(pl=>{
    const grad=ctx.createLinearGradient(pl.x,pl.y,pl.x+pl.w,pl.y+pl.h);
    grad.addColorStop(0,pl.meta?'#ffd700':'#4caf50');
    grad.addColorStop(1,pl.meta?'#ff8f00':'#2e7d32');
    ctx.fillStyle=grad;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(pl.x,pl.y,pl.w,pl.h);
  });
  
  ctx.save();
  ctx.shadowColor='#2196f3';ctx.shadowBlur=20;
  ctx.fillStyle='#2196f3';ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.restore();
  
  ctx.fillStyle='#fff';ctx.font='bold 20px monospace';
  ctx.fillText(`Nivel ${nivelActual}/12`,10,30);
  ctx.fillText(`Puntos: ${puntos}`,10,58);
  ctx.fillText(`Record: ${marcadorMax}`,10,85);
  ctx.fillStyle=p.saltos<2?'#bbdefb':'#f44336';
  ctx.font='bold 16px monospace';
  ctx.fillText(`Saltos: ${2-p.saltos}`,500,30);
  
  if(estado==='win'){
    ctx.fillStyle='rgba(255,215,0,0.95)';ctx.fillRect(0,0,640,400);
    ctx.fillStyle='#000';ctx.font='bold 48px monospace';ctx.textAlign='center';
    ctx.fillText('¡🏆 CAMPEÓN! 🏆',320,190);
    ctx.font='bold 24px monospace';
    ctx.fillText(`Puntos Finales: ${puntos}`,320,240);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
<a href="index.html">⬅ Volver al menú</a>
<a href="Tareas.html">⬅ Volver a tareas</a>
</html>
